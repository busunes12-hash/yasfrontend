# Catch-all default server: silently drop bots / direct-IP / TLS-on-port-80 probes.
# Returning 444 closes the connection with no response and no log noise.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# Real app server: only responds to requests with a valid Host header
# (Traefik forwards with the correct Host, so legitimate traffic lands here).
server {
    listen 80;
    listen [::]:80;
    server_name yasbeads.com www.yasbeads.com;

    root /usr/share/nginx/html;
    index index.html;

    # Don't log the noisy TLS-handshake-on-port-80 garbage
    log_not_found off;

    # Block obviously malformed TLS handshakes hitting plain HTTP
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$) {
        return 444;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml application/json image/svg+xml;

    # Basic security headers (Traefik may add others; these are app-level)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long-cache static assets (Vite emits hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Don't cache the HTML shell so users always get the latest asset hashes
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
